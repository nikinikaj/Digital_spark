name: Agent-only run
# Trigger commit to start the agent-only workflow
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'  # daily at 10:00 Macedonia time (UTC+2)

permissions:
  contents: read

jobs:
  run-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Run agency agents only
        env:
          AUTO_APPROVE: true
        run: |
          python run_agency.py --niche all --payment-provider paypal --deploy-target local
